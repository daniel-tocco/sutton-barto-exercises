name: Compile LaTeX

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX packages
        run: sudo apt-get install -y texlive-latex-extra texlive-science

      - name: Compile all chapters
        run: |
          for dir in chapter-*/; do
            echo "Compiling $dir..."
            pdflatex -interaction=nonstopmode -output-directory="$dir" "${dir}main.tex"
            pdflatex -interaction=nonstopmode -output-directory="$dir" "${dir}main.tex"
          done

      - name: Commit PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chapter-*/main.pdf
          git diff --staged --quiet || git commit -m "Auto-compile PDFs [skip ci]"
          git push
