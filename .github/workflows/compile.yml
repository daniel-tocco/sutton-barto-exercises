name: Compile LaTeX

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile all chapters
        uses: xu-cheng/latex-action@v3
        with:
          root_file: "chapter-*/main.tex"
          glob_root_file: true
          work_in_root_file_dir: true

      - name: Commit PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chapter-*/main.pdf
          git diff --staged --quiet || git commit -m "Auto-compile PDFs [skip ci]"
          git push
