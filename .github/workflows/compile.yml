name: Compile LaTeX

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y texlive-latex-extra texlive-science

      - name: Compile all chapters
        run: |
          failed=0
          for dir in chapter-*/; do
            echo "=== Compiling $dir ==="
            pdflatex -interaction=nonstopmode -output-directory="$dir" "${dir}main.tex" || { echo "FAILED: $dir"; failed=1; }
            pdflatex -interaction=nonstopmode -output-directory="$dir" "${dir}main.tex" || true
          done
          exit $failed

      - name: Commit PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chapter-*/main.pdf
          git diff --staged --quiet || git commit -m "Auto-compile PDFs [skip ci]"
          git push
